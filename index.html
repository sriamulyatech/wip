<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sri Amulya Technologies</title>

<style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family: Arial, Helvetica, sans-serif;
    }

    body{
        background:#000;
        color:#fff;
        height:100vh;
        display:flex;
        justify-content:center;
        align-items:center;
        text-align:center;
    }

    .container{
        padding:20px;
    }

    h1{
        font-size:4rem;
        font-weight:700;
        margin-bottom:15px;
        letter-spacing:2px;
    }

    p{
        font-size:1.2rem;
        color:#aaa;
        letter-spacing:3px;
        text-transform:uppercase;
    }

    .company{
        margin-top:30px;
        font-size:14px;
        color:#666;
        letter-spacing:4px;
        text-transform:uppercase;
    }

    @media (max-width:768px){
        h1{
            font-size:2.5rem;
        }

        p{
            font-size:1rem;
        }
    }
</style>
</head>
<body>

    <div class="container">
        <h1>COMING SOON</h1>
        <p>Work In Progress</p>
        <div class="company">Sri Amulya Technologies</div>
    </div>

</body>
</html>
